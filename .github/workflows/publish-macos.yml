name: publish-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v0.2.0 or v0.2.0-rc.1)"
        required: true
        type: string
      ref:
        description: "Git ref to build from (branch, tag, or commit SHA)"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Parse tag and release channel
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z\.]+)?$ ]]; then
            echo "Unsupported tag format: ${TAG}"
            echo "Expected: vX.Y.Z or vX.Y.Z-rc.1 / vX.Y.Z-beta.1"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Verify version alignment
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version")"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)"

          test "${VERSION}" = "${PKG_VERSION}" || (echo "package.json version mismatch: ${PKG_VERSION} != ${VERSION}" && exit 1)
          test "${VERSION}" = "${TAURI_VERSION}" || (echo "tauri.conf.json version mismatch: ${TAURI_VERSION} != ${VERSION}" && exit 1)
          test "${VERSION}" = "${CARGO_VERSION}" || (echo "Cargo.toml version mismatch: ${CARGO_VERSION} != ${VERSION}" && exit 1)

  quality-gate:
    name: Quality gate (Rust)
    runs-on: macos-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore cargo registry cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore cargo target cache
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-native-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-native-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - quality-gate
    steps:
      - name: Create or update release entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: Vanguard ${{ needs.metadata.outputs.tag }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs:
      - metadata
      - quality-gate
      - create-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo registry cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore cargo target cache
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ matrix.target }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.metadata.outputs.tag }}
          releaseName: Vanguard ${{ needs.metadata.outputs.tag }}
          releaseDraft: false
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          args: --target ${{ matrix.target }}
